<!DOCTYPE html>
<html>

<head>

    <title>
        NBA Historical Simulator
    </title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="container">

    <h1>NBA Historical Simulator</h1>

    <div class="selectors">

        <div class="team-picker">
            <h3>Team A</h3>
            <select id="yearA"></select>
            <select id="teamA"></select>
        </div>

        <div class="vs">VS</div>

        <div class="team-picker">
            <h3>Team B</h3>
            <select id="yearB"></select>
            <select id="teamB"></select>
        </div>

    </div>

    <button onclick="predictMatchup()">
        Simulate Matchup
    </button>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
