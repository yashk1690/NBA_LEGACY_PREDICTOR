<!DOCTYPE html>
<html>

<head>
    <title>NBA Historical Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ── Full-page court background ─────────────────────── -->
<div class="page-bg">
    <img src="images/bg.jpg" alt="">
</div>

<!-- ── Top bar ────────────────────────────────────────── -->
<div class="topbar">
    <span class="topbar-title">NBA Historical Simulator</span>
    <div class="tab-nav">
        <button class="tab-btn active" id="btn-single"
                onclick="switchTab('single')">
            Single Game
        </button>
        <button class="tab-btn" id="btn-series"
                onclick="switchTab('series')">
            Playoff Series
        </button>
        <button class="tab-btn" id="btn-similar"
                onclick="switchTab('similar')">
            Similar Teams
        </button>
    </div>
</div>

<div class="container">

    <!-- ── Single Game Panel ──────────────────────────── -->

    <div id="panel-single" class="panel active">

        <div class="panel-hero">
            <img src="images/game-hero.jpg" alt="">
            <div class="panel-hero-content">
                <span class="panel-hero-title">Single Game</span>
                <span class="panel-hero-sub">
                    10,000 Monte Carlo Simulations · Any Era
                </span>
            </div>
        </div>

        <div class="selectors">

            <div class="team-picker">
                <h3>Team A</h3>
                <select id="yearA"></select>
                <select id="teamA"></select>
            </div>

            <div class="vs">VS</div>

            <div class="team-picker">
                <h3>Team B</h3>
                <select id="yearB"></select>
                <select id="teamB"></select>
            </div>

        </div>

        <button id="btn-predict" onclick="predictMatchup()">
            Simulate Matchup
        </button>

        <div id="result-single"></div>

    </div>

    <!-- ── Playoff Series Panel ───────────────────────── -->

    <div id="panel-series" class="panel">

        <div class="panel-hero">
            <img src="images/playoff-hero.jpg" alt="">
            <div class="panel-hero-content">
                <span class="panel-hero-title">Playoff Series</span>
                <span class="panel-hero-sub">
                    10,000 Best-of-7 Simulations · Any Era
                </span>
            </div>
        </div>

        <div class="selectors">

            <div class="team-picker">
                <h3>Team A</h3>
                <select id="playoffYearA"></select>
                <select id="playoffTeamA"></select>
            </div>

            <div class="vs">VS</div>

            <div class="team-picker">
                <h3>Team B</h3>
                <select id="playoffYearB"></select>
                <select id="playoffTeamB"></select>
            </div>

        </div>

        <div class="sim-controls">

            <div class="model-selector">
                <label>Model</label>
                <select id="playoffModel">
                    <option value="1">Playoff Simulator v1</option>
                    <option value="2">Playoff Simulator v2</option>
                </select>
            </div>

            <button id="btn-series-sim" onclick="predictSeries()">
                Simulate Series
            </button>

        </div>

        <div id="result-series"></div>

    </div>

    <!-- ── Similar Teams Panel ───────────────────────── -->

    <div id="panel-similar" class="panel">

        <div class="panel-hero">
            <img src="images/similar-hero.jpg" alt="">
            <div class="panel-hero-content">
                <span class="panel-hero-title">Similar Teams</span>
                <span class="panel-hero-sub">
                    K-Means Clustering · 5 Archetypes · Any Era
                </span>
            </div>
        </div>

        <div class="similar-search-row">

            <div class="team-picker similar-picker">
                <h3>Pick a Team</h3>
                <select id="similarYear"></select>
                <select id="similarTeam"></select>
            </div>

            <button id="btn-similar-search" onclick="findSimilar()">
                Find Similar Teams
            </button>

        </div>

        <div id="result-similar"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
